<!-- Основной контент (меню) -->
<main class="main-content page active" id="page-menu">
    <div id="menuContainer"></div>
</main>

<!-- Страница Профиль -->
<main class="main-content page" id="page-profile">
    <div class="profile-header">
        <div class="profile-avatar">А</div>
        <div class="profile-info">
            <h3>Александр</h3>
            <div class="profile-phone">+7 (988) 831-47-51</div>
        </div>
    </div>

    <div class="profile-stats">
        <div class="stat-card">
            <div class="stat-value">Start</div>
            <div class="stat-label">Уровень кэшбэка</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">0 ₽</div>
            <div class="stat-label">Бонусы</div>
        </div>
    </div>

    <div class="profile-menu">
        <button class="profile-item" onclick="navigateTo('favorites')">
            <i class="fas fa-heart"></i> Любимые
        </button>
        <button class="profile-item">
            <i class="fas fa-qrcode"></i> QR-код
        </button>
        <button class="profile-item">
            <i class="fas fa-clock"></i> История заказов
        </button>
        <button class="profile-item">
            <i class="fas fa-gift"></i> Начисления баллов
        </button>
    </div>

    <div class="profile-menu" style="margin-top: 16px;">
        <div class="toggle-row">
            <span>Уведомления</span>
            <div class="toggle-switch active" id="notifToggle" onclick="this.classList.toggle('active')"></div>
        </div>
        <button class="profile-item" style="color: var(--primary);">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
    </div>
</main>

<!-- Страница Любимое -->
<main class="main-content page" id="page-favorites">
    <h2 style="margin-bottom: 16px; font-size: 20px;">❤️ Любимые блюда</h2>
    <div id="favoritesEmpty" class="favorites-empty">
        <i class="far fa-heart"></i>
        <p>Здесь будут ваши избранные блюда</p>
        <p style="font-size: 13px; margin-top: 8px;">Нажмите ♥ на карточке товара</p>
    </div>
    <div id="favoritesGrid" class="favorites-grid"></div>
</main>

<!-- Страница Корзина (заглушка) -->
<main class="main-content page" id="page-cart">
    <h2 style="margin-bottom: 16px;">🛒 Корзина</h2>
    <div id="cartContainer"></div>
</main>

<!-- Страница Детали товара -->
<main class="main-content page" id="page-product">
    <button id="backBtn" onclick="goBack()" style="background:none;border:none;font-size:18px;margin-bottom:12px;">
        <i class="fas fa-chevron-left"></i> Назад
    </button>
    <div id="productDetail"></div>
</main>
